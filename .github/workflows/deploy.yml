name: Deploy to AUR

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write   # needed to commit the version bump back to this repo

concurrency:
  group: deploy-to-aur
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest version
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          RAW_TAG=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/Agustinm28/OptiScaler-Client/releases/latest \
            | jq -r '.tag_name')

          VERSION=$(echo "$RAW_TAG" | grep -oE '[0-9]+(\.[0-9]+)*')

          if [ -z "$VERSION" ]; then
            echo "Could not determine latest version, aborting." >&2
            exit 1
          fi

          echo "latest=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Detect version mismatch
        id: check
        run: |
          set -e

          CURRENT=$(grep -Po '^pkgver=\K.*' PKGBUILD)
          LATEST="${{ steps.latest.outputs.latest }}"

          echo "current=$CURRENT"
          echo "latest=$LATEST"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "update=false" >> "$GITHUB_OUTPUT"
          else
            echo "update=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump PKGBUILD version
        if: steps.check.outputs.update == 'true'
        run: |
          set -e
          sed -i "s/^pkgver=.*/pkgver=${{ steps.latest.outputs.latest }}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

      # This is the missing piece that caused the "always pushes" loop:
      # without committing the bump back to THIS repo, next run's
      # "Detect version mismatch" step keeps comparing against the old
      # pkgver forever and update is permanently stuck on true.
      - name: Commit version bump back to repo
        if: steps.check.outputs.update == 'true'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD
          git commit -m "Bump pkgver to ${{ steps.latest.outputs.latest }}"
          git push

      - name: Deploy to AUR
        if: steps.check.outputs.update == 'true' || github.event_name == 'workflow_dispatch'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: optiscaler-client-bin
          pkgbuild: ./PKGBUILD
          assets: |
            optiscaler-client.desktop
          updpkgsums: true
          # updpkgsums downloads the sources (incl. the ~57MB zip) into the
          # AUR repo's working tree to compute their hashes, and leaves them
          # there. Because `assets` is set above, the action stages files
          # with `git add --all` rather than adding PKGBUILD/.SRCINFO
          # individually -- which sweeps those leftover downloads into the
          # commit too. AUR's push hook rejects any blob over ~488KiB, which
          # is exactly what happened. Delete them here, before the commit step.
          post_process: |
            rm -fv optiscaler-client.zip optiscaler-icon-256.png optiscaler-icon-128.png
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_username: ${{ secrets.AUR_COMMIT_USERNAME }}
          commit_email: ${{ secrets.AUR_COMMIT_EMAIL }}
          allow_empty_commits: false
