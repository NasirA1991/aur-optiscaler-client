name: Deploy to AUR

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest version
        id: latest
        run: |
          set -e

          RAW_TAG=$(curl -s \
            https://api.github.com/repos/Agustinm28/OptiScaler-Client/releases/latest \
            | jq -r '.tag_name')

          # ONLY numbers + dots (important for AUR)
          VERSION=$(echo "$RAW_TAG" | grep -oE '[0-9]+(\.[0-9]+)*')

          echo "latest=$VERSION" >> $GITHUB_OUTPUT

      - name: Update PKGBUILD (always enforce clean version)
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ steps.latest.outputs.latest }}/" PKGBUILD

      - name: Generate .SRCINFO (clean Arch method)
        run: |
          docker run --rm \
            -v "$PWD:/pkg" \
            -w /pkg \
            archlinux:latest \
            bash -c "
              pacman -Sy --noconfirm base-devel >/dev/null
              useradd -m builder
              chown -R builder:builder /pkg
              su builder -c 'cd /pkg && makepkg --printsrcinfo > .SRCINFO'
            "

      - name: Deploy to AUR (ALWAYS)
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: optiscaler-client-bin
          pkgbuild: ./PKGBUILD
          assets: |
            PKGBUILD
            .SRCINFO
            optiscaler-client.desktop
          SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_username: ${{ secrets.AUR_COMMIT_USERNAME }}
          commit_email: ${{ secrets.AUR_COMMIT_EMAIL }}
          updpkgsums: false
          allow_empty_commits: true
