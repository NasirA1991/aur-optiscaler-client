name: Deploy to AUR

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest version
        id: latest
        run: |
          set -e

          RAW_TAG=$(curl -s \
            https://api.github.com/repos/Agustinm28/OptiScaler-Client/releases/latest \
            | jq -r '.tag_name')

          VERSION=$(echo "$RAW_TAG" | grep -oE '[0-9]+(\.[0-9]+)*')

          echo "latest=$VERSION" >> $GITHUB_OUTPUT

      - name: Detect version mismatch
        id: check
        run: |
          set -e

          CURRENT=$(grep -Po '^pkgver=\K.*' PKGBUILD)
          LATEST="${{ steps.latest.outputs.latest }}"

          echo "current=$CURRENT"
          echo "latest=$LATEST"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "update=false" >> $GITHUB_OUTPUT
          else
            echo "update=true" >> $GITHUB_OUTPUT
          fi

      - name: Always allow manual override (IMPORTANT FIX)
        if: github.event_name == 'workflow_dispatch'
        run: echo "manual=true" >> $GITHUB_OUTPUT
        id: manual

      - name: Update PKGBUILD
        if: steps.check.outputs.update == 'true'
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ steps.latest.outputs.latest }}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

      - name: Generate .SRCINFO
        run: |
          docker run --rm \
            -v "$PWD:/pkg" \
            -w /pkg \
            archlinux:latest \
            bash -c "
              pacman -Sy --noconfirm base-devel >/dev/null
              useradd -m builder
              chown -R builder:builder /pkg
              su builder -c 'cd /pkg && makepkg --printsrcinfo > .SRCINFO'
            "

      - name: Deploy to AUR (force on manual OR update)
        if: steps.check.outputs.update == 'true' || github.event_name == 'workflow_dispatch'
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: optiscaler-client-bin
          pkgbuild: ./PKGBUILD
          assets: |
            PKGBUILD
            .SRCINFO
          SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_username: ${{ secrets.AUR_COMMIT_USERNAME }}
          commit_email: ${{ secrets.AUR_COMMIT_EMAIL }}
          updpkgsums: false
          allow_empty_commits: true
