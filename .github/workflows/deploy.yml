name: Deploy to AUR

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest release
        id: release
        run: |
          set -e

          RAW_TAG=$(curl -s \
            https://api.github.com/repos/Agustinm28/OptiScaler-Client/releases/latest \
            | jq -r '.tag_name')

          VERSION=$(echo "$RAW_TAG" | grep -oE '[0-9]+(\.[0-9]+)*')

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if update is needed
        id: check
        run: |
          set -e

          CURRENT=$(grep -Po '^pkgver=\K.*' PKGBUILD)
          LATEST="${{ steps.release.outputs.version }}"

          echo "current=$CURRENT"
          echo "latest=$LATEST"

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "update=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "update=true" >> $GITHUB_OUTPUT

      - name: Update PKGBUILD + SHA256
        if: steps.check.outputs.update == 'true'
        run: |
          set -e

          VERSION="${{ steps.release.outputs.version }}"

          sed -i "s/^pkgver=.*/pkgver=$VERSION/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          URL="https://github.com/Agustinm28/Optiscaler-Client/releases/download/OptiscalerClient-${VERSION}/OptiscalerClient-${VERSION}-linux-x64.zip"

          curl -L -o optiscaler.zip "$URL"

          SHA256=$(sha256sum optiscaler.zip | awk '{print $1}')

          sed -i "s|^sha256sums=.*|sha256sums=('$SHA256' 'SKIP' 'SKIP' 'SKIP')|" PKGBUILD

      - name: Generate .SRCINFO
        if: steps.check.outputs.update == 'true'
        run: |
          docker run --rm \
            -v "$PWD:/pkg" \
            -w /pkg \
            archlinux:latest \
            bash -c "
              pacman -Sy --noconfirm base-devel >/dev/null
              useradd -m builder
              chown -R builder:builder /pkg
              su builder -c 'cd /pkg && makepkg --printsrcinfo > .SRCINFO'
            "

      - name: Clean workspace
        if: steps.check.outputs.update == 'true'
        run: |
          rm -f optiscaler.zip || true
          git clean -fdx

      - name: Deploy to AUR
        if: steps.check.outputs.update == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: optiscaler-client-bin
          pkgbuild: ./PKGBUILD
          assets: |
            PKGBUILD
            .SRCINFO
            optiscaler-client.desktop
          SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_username: ${{ secrets.AUR_COMMIT_USERNAME }}
          commit_email: ${{ secrets.AUR_COMMIT_EMAIL }}
          updpkgsums: false
          allow_empty_commits: false
