name: Deploy to AUR

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest version and compute SHA256
        id: latest
        run: |
          set -e

          RAW_TAG=$(curl -s \
            https://api.github.com/repos/Agustinm28/OptiScaler-Client/releases/latest \
            | jq -r '.tag_name')

          VERSION=$(echo "$RAW_TAG" | grep -oE '[0-9]+(\.[0-9]+)*')

          curl -L -s -o /tmp/release.zip \
            "https://github.com/Agustinm28/OptiScaler-Client/releases/download/OptiscalerClient-${VERSION}/OptiscalerClient-${VERSION}-linux-x64.zip"

          SHA=$(sha256sum /tmp/release.zip | awk '{print $1}')

          echo "latest=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Detect version or SHA mismatch
        id: check
        run: |
          set -e

          CURRENT_VER=$(grep -Po '^pkgver=\K.*' PKGBUILD)
          CURRENT_SHA=$(grep -Po "^sha256sums=\('\K[^']*" PKGBUILD | head -n1)

          LATEST_VER="${{ steps.latest.outputs.latest }}"
          LATEST_SHA="${{ steps.latest.outputs.sha }}"

          echo "current_ver=$CURRENT_VER  latest_ver=$LATEST_VER"
          echo "current_sha=$CURRENT_SHA  latest_sha=$LATEST_SHA"

          if [ "$CURRENT_VER" != "$LATEST_VER" ] || [ "$CURRENT_SHA" != "$LATEST_SHA" ]; then
            echo "update=true" >> "$GITHUB_OUTPUT"
          else
            echo "update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if nothing changed
        if: steps.check.outputs.update != 'true' && github.event_name != 'workflow_dispatch'
        run: echo "No update needed"

      - name: Update PKGBUILD
        if: steps.check.outputs.update == 'true' || github.event_name == 'workflow_dispatch'
        env:
          LATEST: ${{ steps.latest.outputs.latest }}
          SHA: ${{ steps.latest.outputs.sha }}
        run: |
          set -e

          sed -i "s/^pkgver=.*/pkgver=${LATEST}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          python3 << 'PYEOF'
import os, re
sha = os.environ['SHA']

with open('PKGBUILD', 'r') as f:
    content = f.read()

content, n = re.subn(
    r"(sha256sums=\(')[^']*(')",
    lambda m: m.group(1) + sha + m.group(2),
    content,
    count=1
)

assert n == 1
with open('PKGBUILD', 'w') as f:
    f.write(content)

print("Injected SHA:", sha)
PYEOF

      - name: Generate .SRCINFO (FIXED)
        if: steps.check.outputs.update == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          set -e

          docker run --rm \
            -v "$PWD:/pkg" \
            -w /pkg \
            archlinux:latest \
            bash -c "
              pacman -Sy --noconfirm base-devel >/dev/null
              useradd -m builder
              su builder -c 'cd /pkg && makepkg --printsrcinfo > .SRCINFO'
            "

      - name: Fix repo permissions (IMPORTANT FIX)
        if: steps.check.outputs.update == 'true' || github.event_name == 'workflow_dispatch'
        run: sudo chown -R $(whoami):$(whoami) .

      - name: Commit changes
        if: steps.check.outputs.update == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add PKGBUILD .SRCINFO
          git commit -m "chore: bump to ${{ steps.latest.outputs.latest }}" || exit 0
          git push

      - name: Deploy to AUR
        if: steps.check.outputs.update == 'true' || github.event_name == 'workflow_dispatch'
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: optiscaler-client-bin
          pkgbuild: ./PKGBUILD
          assets: |
            PKGBUILD
            .SRCINFO
            optiscaler-client.desktop
          SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_username: ${{ secrets.AUR_COMMIT_USERNAME }}
          commit_email: ${{ secrets.AUR_COMMIT_EMAIL }}
          updpkgsums: false
          allow_empty_commits: true
